name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal --blame-hang-timeout 5m

      - name: Pack
        run: |
          VERSION=${GITHUB_TAG#v}
          # The whole monorepo ships on one version: the release tag. Cut a prerelease tag
          # (e.g. v1.4.5-preview1) to publish every package as that prerelease — the way to keep
          # Localization on a preview train while it matures, without special-casing it here.

          # Mapper
          dotnet pack src/Mapper/ArchPillar.Extensions.Mapper.csproj -c Release --no-build -o ./nupkgs -p:PackageVersion=$VERSION
          dotnet pack src/Mapper.EntityFrameworkCore/ArchPillar.Extensions.Mapper.EntityFrameworkCore.csproj -c Release --no-build -o ./nupkgs -p:PackageVersion=$VERSION

          # Localization. The analyzer and code-fixes are bundled into the main package, not published.
          for project in \
            Localization/ArchPillar.Extensions.Localization \
            Localization.Abstractions/ArchPillar.Extensions.Localization.Abstractions \
            Localization.MessageFormat/ArchPillar.Extensions.Localization.MessageFormat \
            Localization.DependencyInjection/ArchPillar.Extensions.Localization.DependencyInjection \
            Localization.StringLocalizer/ArchPillar.Extensions.Localization.StringLocalizer \
            Localization.AspNetCore/ArchPillar.Extensions.Localization.AspNetCore \
            Localization.Tooling/ArchPillar.Extensions.Localization.Tooling
          do
            dotnet pack "src/$project.csproj" -c Release --no-build -o ./nupkgs -p:PackageVersion=$VERSION
          done
        env:
          GITHUB_TAG: ${{ github.event.release.tag_name }}

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
