name: Publish Claude skills

# Publishes this repo's Agent Skills into the shared marketplace repo, on par with (but separate
# from) the NuGet publish. The monorepo is the source of truth; the marketplace repo is a generated
# mirror. The marketplace repo owns the canonical builder (build_marketplace.py); this job clones it
# and runs it against this checkout (--source-root). Gating is derived from publish.yml — only
# published libraries get a plugin.
#
# Auth: a GitHub App (org-owned, scoped to the marketplace repo with Contents: write). The job mints
# a short-lived installation token at runtime — no personal PAT, auto-rotating. Two secrets required
# on this repo:
#   SKILLS_APP_ID           - the GitHub App's App ID
#   SKILLS_APP_PRIVATE_KEY  - the App's private key (PEM)
# Without them the token step fails; the publish is intended to run only when they are configured.
# Pushes directly to the marketplace repo's main (it is a generated artifact; no PR flow).

on:
  release:
    types: [published]

jobs:
  publish-skills:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SKILLS_REPO: ArchPillar/claude-skills
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Mint marketplace token (GitHub App)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SKILLS_APP_ID }}
          private-key: ${{ secrets.SKILLS_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: claude-skills

      - name: Build and publish to the marketplace repo
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION=${GITHUB_TAG#v}

          # Clone the marketplace repo: it is both the merge target (--into) and the home of the
          # canonical builder we run.
          git clone "https://x-access-token:${TOKEN}@github.com/${SKILLS_REPO}.git" target

          python3 target/build_marketplace.py \
            --source-root "$GITHUB_WORKSPACE" \
            --into target \
            --version "$VERSION" \
            --source-repo "https://github.com/${GITHUB_REPOSITORY}" \
            --marketplace-repo "${SKILLS_REPO}"

          cd target
          # Attribute commits to the App's bot identity (numeric id form → verified attribution).
          USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id 2>/dev/null || echo "")
          EMAIL="${APP_SLUG}[bot]@users.noreply.github.com"
          [ -n "$USER_ID" ] && EMAIL="${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "$EMAIL"

          git add -A
          if git diff --cached --quiet; then
            echo "No marketplace changes to publish."
            exit 0
          fi
          git commit -m "Publish skills from ${GITHUB_REPOSITORY}@${VERSION}"
          git branch -M main
          git push -u origin main
