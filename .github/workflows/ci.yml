name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  skills-manifest:
    name: Skills manifest check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SKILLS_REPO: ArchPillar/claude-skills
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The builder is canonical in the marketplace repo; fetch it (public, shallow clone) and check
      # this repo's manifest against it. Fails if a published skill is missing from the manifest
      # (would silently never ship) or the manifest lists a skill that does not exist.
      - name: Fetch the canonical builder
        run: git clone --depth 1 "https://github.com/${SKILLS_REPO}.git" target
      - name: Check skill marketplace manifest
        run: python3 target/build_marketplace.py --check --source-root "$GITHUB_WORKSPACE"

  build-and-test:
    runs-on: ubuntu-latest
    # Cap the job so a hanging test can never burn the runner for hours.
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        # --blame-hang-timeout names and dumps a test that wedges, instead of hanging until the job cap.
        run: dotnet test -c Release --no-build --verbosity normal --blame-hang-timeout 5m

  trim-aot-publish:
    name: Trim & NativeAOT publish
    runs-on: ubuntu-latest
    # NativeAOT native compilation is slower than a normal build, so this job gets its own cap.
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Install NativeAOT prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      # The samples self-validate: they print OK/BROKEN and return exit 0 only when every embed/file/satellite
      # translation resolved, so a non-zero exit (a trimmer or AOT regression in the library) fails the job.
      - name: Publish and run the trim + single-file sample
        run: |
          dotnet publish samples/Localization/Localization.TrimSample/Localization.TrimSample.csproj \
            -c Release -r linux-x64 --self-contained true -o artifacts/trim
          ./artifacts/trim/TrimSample

      - name: Publish and run the NativeAOT sample
        run: |
          dotnet publish samples/Localization/Localization.AotSample/Localization.AotSample.csproj \
            -c Release -r linux-x64 -o artifacts/aot
          ./artifacts/aot/AotSample
