name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Cap the job so a hanging test can never burn the runner for hours.
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        # --blame-hang-timeout names and dumps a test that wedges, instead of hanging until the job cap.
        run: dotnet test -c Release --no-build --verbosity normal --blame-hang-timeout 5m
