name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test Mapper
        run: dotnet test tests/Mapper.Tests -c Release --no-build --verbosity normal

      - name: Test Pipelines
        run: dotnet test tests/Pipelines.Tests -c Release --no-build --verbosity normal
